version: "2"

run:
  go: 1.26.2
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - vendor$
      - scripts/
linters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - scripts/
