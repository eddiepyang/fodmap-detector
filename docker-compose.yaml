services:
  postgres:
    # pgvector image (drop-in for postgres:16) — the schema uses vector(768)
    # columns and db migrate-up runs CREATE EXTENSION vector unconditionally.
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: fodmap
      POSTGRES_PASSWORD: fodmap
      POSTGRES_DB: fodmap
    volumes:
      - postgres_data:/var/lib/postgresql/data
  weaviate:
    image: semitechnologies/weaviate:1.25.4
    ports:
      - "127.0.0.1:8090:8080"
      - "127.0.0.1:50051:50051"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
  extractor:
    # Python document/vision service for scanned PDF menu extraction.
    # Not started by default — use: docker compose --profile extractor up -d extractor
    # Or run locally: cd ../scraper && uv run uvicorn scraper.app:app --port 8765
    build: ../scraper
    image: scraper:latest
    profiles: ["extractor"]
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      SCRAPER_OCR_BACKEND: "${SCRAPER_OCR_BACKEND:-stub}"
      SCRAPER_LOG_LEVEL: "info"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8765/healthz').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  weaviate_data:
