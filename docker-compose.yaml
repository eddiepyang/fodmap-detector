services:
  postgres:
    # pgvector image (drop-in for postgres:16) — the schema uses vector(768)
    # columns and db migrate-up runs CREATE EXTENSION vector unconditionally.
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: fodmap
      POSTGRES_PASSWORD: fodmap
      POSTGRES_DB: fodmap
    volumes:
      - postgres_data:/var/lib/postgresql/data
  weaviate:
    image: semitechnologies/weaviate:1.25.4
    ports:
      - "127.0.0.1:8090:8080"
      - "127.0.0.1:50051:50051"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate

  # Python scraper service for PDF/OCR + webagent (Phase A/B).
  # Disabled by default — uncomment to enable routed PDF/OCR extraction.
  # Requires the scraper repo at ../scraper with a built image, or run it
  # outside Docker via START_SCRAPER=true ./start.sh.
  # scraper:
  #   image: scraper:latest
  #   build:
  #     context: ../scraper
  #   ports:
  #     - "127.0.0.1:8765:8765"
  #   environment:
  #     SCRAPER_OCR_BACKEND: "stub"  # auto | mlx | vllm | stub
  #     # SCRAPER_API_KEY: "set-a-secret"  # bearer auth for /v1 (empty = no auth)
  #     # SCRAPER_WEBAGENT_ENABLED: "true"
  #     # SCRAPER_WEBAGENT_ADAPTERS_DIR: "src/scraper/webagent/adapters"

volumes:
  postgres_data:
  weaviate_data:
