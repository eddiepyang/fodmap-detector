name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Format
        run: go fmt ./...
        
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        env:
          GOTOOLCHAIN: go1.26.2
        with:
          version: latest
          install-mode: goinstall

      - name: Test with coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Report coverage
        run: |
          grep -v "fodmap/cli" coverage.out > coverage_filtered.out
          go tool cover -func=coverage_filtered.out
          echo ""
          echo "--- Total (excluding cli) ---"
          TOTAL=$(go tool cover -func=coverage_filtered.out | grep total: | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $TOTAL%"
          if (( $(echo "$TOTAL < 70" | bc -l) )); then
            echo "Coverage is below 70%! Failing build."
            exit 1
          fi
